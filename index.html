<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RESCOPE 2K26 — Live Scoreboard</title>
<link rel="stylesheet" href="style.css" />
<style>
  /* Scoreboard specific layout enhancements */
  .standings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-top: 20px;
  }
  .house-card {
    border: var(--border-w) solid var(--ink);
    padding: 24px;
    background: var(--paper);
    box-shadow: 4px 4px 0px var(--ink);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 150px;
  }
  .house-card:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0px var(--ink);
  }
  .house-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .house-badge {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1px solid var(--ink);
  }
  .house-name {
    font-family: var(--font-mono);
    font-size: 1.25rem;
    font-weight: 800;
  }
  .house-points {
    font-size: 3rem;
    font-weight: 900;
    line-height: 1;
    margin-top: auto;
    text-align: right;
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">RESCOPE <span class="brand-year">2K26</span></div>
    <nav class="nav-links">
      <a href="index.html" class="active">Standings</a>
      <a href="signin.html">Team Access</a>
      <a href="admin.html">Admin</a>
    </nav>
  </div>
</header>

<main class="container">
  <section class="section">
    <div class="section-head">
      <h2>House Standings</h2>
      <span class="ticker" id="live-indicator">● Connecting to Supabase...</span>
    </div>

    <!-- Live leader cards container -->
    <div class="standings-grid" id="standings-container">
      <div class="empty-state">Loading houses and scores...</div>
    </div>
  </section>
</main>

<footer>RESCOPE 2K26 · Horizon · Eclipse · Vector · Chroma</footer>

<script type="module">
  import { 
    seedTeamsIfEmpty, 
    listenTeams, 
    HOUSES 
  } from "./firebase-config.js";

  const container = document.getElementById("standings-container");
  const indicator = document.getElementById("live-indicator");

  // On page load, run a self-healing check to populate empty databases, then start listening
  async function initScoreboard() {
    try {
      // Auto-populate houses if first load on clean database
      await seedTeamsIfEmpty();
      
      // Start real-time standings feed
      listenTeams((teams) => {
        indicator.textContent = "● Live Connections Active";
        indicator.style.color = "#0B8457"; // Signal Green

        if (!teams || teams.length === 0) {
          container.innerHTML = `<div class="empty-state">No house team records found.</div>`;
          return;
        }

        // Sort descending by total points
        const sorted = [...teams].sort((a, b) => (b.totalPoints || 0) - (a.totalPoints || 0));

        container.innerHTML = sorted.map((team, index) => {
          // Cross-reference config static details for consistent accent colors
          const staticConf = HOUSES.find(h => h.id === team.id) || { color: "#6b6b6b" };
          const placementPrefix = index === 0 ? "🏆 " : "";

          return `
            <div class="house-card" style="border-top: 10px solid ${staticConf.color}">
              <div class="house-header">
                <span class="house-badge" style="background-color: ${staticConf.color}"></span>
                <span class="house-name">${placementPrefix}${team.id.toUpperCase()}</span>
              </div>
              <div class="house-points" style="color: ${staticConf.color}">
                ${team.totalPoints || 0}<span style="font-size: 1rem; color: var(--ink); font-weight: normal; margin-left: 4px;">pts</span>
              </div>
            </div>
          `;
        }).join("");
      });

    } catch (err) {
      console.error("Scoreboard bootstrap error:", err);
      indicator.textContent = "● Offline - Connection Blocked";
      indicator.style.color = "#D7263D"; // Red error
      container.innerHTML = `
        <div class="empty-state" style="border-color: #D7263D; color: #D7263D;">
          Unable to establish safe connection to your Supabase tables. 
          <br/><span style="font-size: 0.8rem; font-family: monospace; display:block; margin-top:10px;">Reason: ${err.message}</span>
        </div>
      `;
    }
  }

  // Execute
  initScoreboard();
</script>

</body>
</html>

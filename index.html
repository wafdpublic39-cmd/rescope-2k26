<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RESCOPE 2K26 — Live Scoreboard</title>
<link rel="stylesheet" href="style.css" />
<style>
  /* Standings Cards Styling */
  .standings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }
  .house-card {
    border: var(--border-w) solid var(--ink);
    padding: 24px;
    background: var(--paper);
    box-shadow: 4px 4px 0px var(--ink);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 140px;
  }
  .house-card:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0px var(--ink);
  }
  .house-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .house-badge {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1px solid var(--ink);
  }
  .house-name {
    font-family: var(--font-mono);
    font-size: 1.25rem;
    font-weight: 800;
  }
  .house-points {
    font-size: 3rem;
    font-weight: 900;
    line-height: 1;
    margin-top: auto;
    text-align: right;
  }

  /* Balanced Two-Column Board Layout */
  .scoreboard-layout {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 30px;
    margin-top: 10px;
  }

  @media (max-width: 900px) {
    .scoreboard-layout {
      grid-template-columns: 1fr;
    }
  }

  /* Individual Leaderboard Table */
  .leader-table-wrapper {
    overflow-x: auto;
    border: var(--border-w) solid var(--ink);
    background: var(--paper);
    box-shadow: 4px 4px 0px var(--ink);
  }
  .leader-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.95rem;
  }
  .leader-table th, .leader-table td {
    border-bottom: var(--border-w) solid var(--ink);
    padding: 12px 16px;
    text-align: left;
  }
  .leader-table th {
    background: var(--paper-off);
    font-family: var(--font-mono);
    font-weight: 800;
    text-transform: uppercase;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
  }
  .leader-table tr:last-child td {
    border-bottom: none;
  }
  .rank-col {
    font-family: var(--font-mono);
    font-weight: 800;
    width: 50px;
    text-align: center;
  }
  .house-indicator-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    font-family: var(--font-mono);
    font-weight: 700;
    padding: 2px 8px;
    border: 1px solid var(--ink);
    border-radius: 4px;
  }

  /* Programs & Registrations Column */
  .program-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .program-card {
    background: var(--paper);
    border: var(--border-w) solid var(--ink);
    padding: 18px;
    box-shadow: 4px 4px 0px var(--ink);
  }
  .program-title-row {
    font-family: var(--font-mono);
    font-size: 1.1rem;
    font-weight: 800;
    border-bottom: 1px solid var(--ink);
    padding-bottom: 8px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .program-code {
    font-size: 0.75rem;
    background: var(--paper-off);
    border: 1px solid var(--ink);
    padding: 2px 8px;
    border-radius: 4px;
  }
  .registrations-chips-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .participant-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--paper-off);
    border: 1px solid var(--ink);
    padding: 4px 10px;
    font-size: 0.8rem;
    border-radius: 4px;
    font-weight: 600;
  }
  .chip-color-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.2);
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">RESCOPE <span class="brand-year">2K26</span></div>
    <nav class="nav-links">
      <a href="index.html" class="active">Standings</a>
      <a href="signin.html">Team Access</a>
      <a href="admin.html">Admin</a>
    </nav>
  </div>
</header>

<main class="container">
  
  <!-- ============ OVERALL HOUSE STANDINGS ============ -->
  <section class="section" style="border-bottom: 1px solid var(--ink); padding-bottom: 24px;">
    <div class="section-head">
      <h2>House Standings</h2>
      <span class="ticker" id="live-indicator">● Connecting to Database...</span>
    </div>

    <div class="standings-grid" id="standings-container">
      <div class="empty-state">Establishing real-time link...</div>
    </div>
  </section>

  <!-- ============ LEADERBOARD & EVENTS TWO-COL LAYOUT ============ -->
  <div class="scoreboard-layout">
    
    <!-- Left Column: Top Individual Participants -->
    <section class="panel" style="padding: 0; background: transparent; border: none;">
      <h3 style="margin-bottom: 16px; font-size: 1.3rem;">🏆 Top Participants</h3>
      <div class="leader-table-wrapper">
        <table class="leader-table">
          <thead>
            <tr>
              <th class="rank-col">Rank</th>
              <th>Name & Code</th>
              <th>House</th>
              <th style="text-align: right;">Points</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body">
            <tr>
              <td colspan="4" class="empty-state">Loading active rosters...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- Right Column: Programs & Mapped Registrations -->
    <section class="panel" style="padding: 0; background: transparent; border: none;">
      <h3 style="margin-bottom: 16px; font-size: 1.3rem;">⚡ Event Enrollments</h3>
      <div class="program-list" id="programs-container">
        <div class="empty-state">Loading program allocations...</div>
      </div>
    </section>

  </div>

</main>

<footer>RESCOPE 2K26 · Horizon · Eclipse · Vector · Chroma</footer>

<script type="module">
  import { 
    seedTeamsIfEmpty, 
    listenTeams, 
    listenParticipants,
    listenPrograms,
    listenRegistrations,
    HOUSES 
  } from "./firebase-config.js";

  const standingsContainer = document.getElementById("standings-container");
  const leaderboardBody = document.getElementById("leaderboard-body");
  const programsContainer = document.getElementById("programs-container");
  const indicator = document.getElementById("live-indicator");

  // Project state arrays
  let allTeams = [];
  let allParticipants = [];
  let allPrograms = [];
  let allRegistrations = [];

  // Unified rendering function to prevent layout race conditions
  function renderAll() {
    renderStandings();
    renderLeaderboard();
    renderPrograms();
  }

  // 1. Render House Scores Grid
  function renderStandings() {
    if (allTeams.length === 0) {
      standingsContainer.innerHTML = `<div class="empty-state">No team records initialized.</div>`;
      return;
    }

    const sorted = [...allTeams].sort((a, b) => (b.totalPoints || 0) - (a.totalPoints || 0));

    standingsContainer.innerHTML = sorted.map((team, index) => {
      const config = HOUSES.find(h => h.id === team.id) || { color: "#6b6b6b" };
      const crown = index === 0 ? "👑 " : "";

      return `
        <div class="house-card" style="border-top: 10px solid ${config.color}">
          <div class="house-header">
            <span class="house-badge" style="background-color: ${config.color}"></span>
            <span class="house-name">${crown}${team.id.toUpperCase()}</span>
          </div>
          <div class="house-points" style="color: ${config.color}">
            ${team.totalPoints || 0}<span style="font-size: 0.95rem; color: var(--ink); font-weight: normal; margin-left: 4px;">pts</span>
          </div>
        </div>
      `;
    }).join("");
  }

  // 2. Render High Score Participant Leaderboard
  function renderLeaderboard() {
    // Only show participants that have points (or show top 15 list)
    const activeScorers = [...allParticipants]
      .sort((a, b) => (b.totalPoints || 0) - (a.totalPoints || 0))
      .slice(0, 15); // Show top 15 players

    if (activeScorers.length === 0) {
      leaderboardBody.innerHTML = `
        <tr>
          <td colspan="4" class="empty-state" style="padding: 30px;">No points awarded to participants yet.</td>
        </tr>
      `;
      return;
    }

    leaderboardBody.innerHTML = activeScorers.map((p, idx) => {
      const config = HOUSES.find(h => h.id === p.team) || { color: "#6b6b6b" };
      const rank = idx + 1;
      let medal = rank;
      if (rank === 1) medal = "🥇";
      if (rank === 2) medal = "🥈";
      if (rank === 3) medal = "🥉";

      return `
        <tr>
          <td class="rank-col">${medal}</td>
          <td>
            <b style="font-size: 1.05rem;">${p.name}</b>
            <span style="font-family: var(--font-mono); font-size: 0.78rem; color: #6b6b6b; display: block;">ID: ${p.id}</span>
          </td>
          <td>
            <span class="house-indicator-badge" style="border-color: ${config.color}; color: ${config.color}; background: ${config.color}08;">
              <span class="chip-color-dot" style="background-color: ${config.color}; border: none; width:6px; height:6px;"></span>
              ${p.team.toUpperCase()}
            </span>
          </td>
          <td style="text-align: right; font-weight: 800; font-family: var(--font-mono); font-size: 1.1rem; color: ${config.color};">
            ${p.totalPoints || 0}
          </td>
        </tr>
      `;
    }).join("");
  }

  // 3. Render Admin-added Programs & registered candidate chips
  function renderPrograms() {
    if (allPrograms.length === 0) {
      programsContainer.innerHTML = `<div class="empty-state">No active programs added by Admin yet.</div>`;
      return;
    }

    programsContainer.innerHTML = allPrograms.map(prog => {
      // Find matches in registrations mapping
      const mappedRegs = allRegistrations.filter(r => r.program_id === prog.id);

      // Map registrations to participant metadata
      const enrolledChips = mappedRegs.map(reg => {
        const participant = allParticipants.find(p => p.id === reg.participant_id);
        if (!participant) return ""; // Stale data backup

        const config = HOUSES.find(h => h.id === participant.team) || { color: "#6b6b6b" };

        return `
          <span class="participant-chip" title="House: ${participant.team}">
            <span class="chip-color-dot" style="background-color: ${config.color}"></span>
            <span>${participant.name} <span style="font-family: var(--font-mono); font-size: 0.72rem; color: #6b6b6b;">(${participant.id})</span></span>
          </span>
        `;
      }).filter(Boolean).join("");

      return `
        <div class="program-card">
          <div class="program-title-row">
            <span>${prog.title}</span>
            <span class="program-code">${prog.id}</span>
          </div>
          <div class="registrations-chips-container">
            ${enrolledChips || `<span style="font-size: 0.8rem; color: #8c8c8c; font-style: italic;">No candidate enrolled yet</span>`}
          </div>
        </div>
      `;
    }).join("");
  }

  // System setup & real-time connection initializer
  async function init() {
    try {
      // Auto-populate houses database config on virgin runs
      await seedTeamsIfEmpty();

      // Fire off listeners
      listenTeams((teams) => {
        allTeams = teams;
        indicator.textContent = "● Live Score Sync Active";
        indicator.style.color = "#0B8457";
        renderAll();
      });

      listenParticipants((participants) => {
        allParticipants = participants;
        renderAll();
      });

      listenPrograms((programs) => {
        allPrograms = (programs || []).sort((a, b) => a.id.localeCompare(b.id));
        renderAll();
      });

      listenRegistrations((registrations) => {
        allRegistrations = registrations;
        renderAll();
      });

    } catch (err) {
      console.error("Scoreboard connection error:", err);
      indicator.textContent = "● Offline — Connection Blocked";
      indicator.style.color = "#D7263D";
    }
  }

  init();
</script>

</body>
</html>

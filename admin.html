<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RESCOPE 2K26 — Admin</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">RESCOPE <span class="brand-year">2K26</span></div>
    <nav class="nav-links">
      <a href="index.html">Standings</a>
      <a href="signin.html">Team Access</a>
      <a href="admin.html" class="active">Admin</a>
    </nav>
  </div>
</header>

<!-- ============ ADMIN PASSWORD GATE ============ -->
<div class="gate" id="gate">
  <div class="gate-box">
    <h2>Admin Access</h2>
    <span class="sub">Master password required to open the command center.</span>
    <div class="field">
      <label for="admin-password">Master password</label>
      <input type="password" id="admin-password" placeholder="Enter master password" />
    </div>
    <button class="btn btn-block" id="admin-login-btn">Unlock Dashboard</button>
    <div class="error-text" id="gate-error"></div>
  </div>
</div>

<!-- ============ ADMIN DASHBOARD ============ -->
<main class="container hidden" id="dashboard">

  <section class="section" style="border-bottom:none;padding-bottom:0;">
    <div class="section-head">
      <h2>Command Center</h2>
      <button class="btn btn-outline" id="signout-btn">Lock Dashboard</button>
    </div>
  </section>

  <!-- ---- Event Program Manager ---- -->
  <section class="section two-col">
    <div class="panel">
      <h3 style="margin-bottom:18px;font-size:1.1rem;">Add Program</h3>
      <form id="add-program-form">
        <div class="field">
          <label for="program-code">Program code</label>
          <input type="text" id="program-code" placeholder="e.g. FA-01" required />
        </div>
        <div class="field">
          <label for="program-title">Title</label>
          <input type="text" id="program-title" placeholder="e.g. Solo Dance" required />
        </div>
        <div class="field">
          <label for="program-category">Category</label>
          <select id="program-category" required>
            <option value="art">🎨 Arts Program</option>
            <option value="sport">⚽ Sports Program</option>
          </select>
        </div>
        <button type="submit" class="btn btn-signal btn-block">Add Program</button>
      </form>
      <div id="add-program-status"></div>
    </div>

    <div class="panel">
      <h3 style="margin-bottom:18px;font-size:1.1rem;">Existing Programs</h3>
      <div id="program-list" style="max-height: 380px; overflow-y: auto;"></div>
    </div>
  </section>

  <!-- ---- Points Ledger Adjuster ---- -->
  <section class="section">
    <div class="section-head">
      <h2>Points Ledger Adjuster</h2>
      <span class="section-num">Auto-updates program · candidate · house</span>
    </div>

    <div class="panel">
      <form id="ledger-form">
        <div class="grid-2">
          <div class="field">
            <label for="ledger-program">Program</label>
            <select id="ledger-program" required>
              <option value="">— Select program —</option>
            </select>
          </div>
          <div class="field">
            <label for="ledger-code">Candidate code</label>
            <input type="text" id="ledger-code" placeholder="e.g. HZ07" required />
          </div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label>Action</label>
            <div class="segmented" id="action-toggle">
              <button type="button" class="active add" data-action="add">Add</button>
              <button type="button" class="subtract" data-action="subtract">Subtract</button>
            </div>
          </div>
          <div class="field">
            <label for="ledger-value">Point value</label>
            <input type="number" id="ledger-value" min="1" step="1" placeholder="e.g. 10" required />
          </div>
        </div>

        <button type="submit" class="btn btn-block">Submit Ledger Entry</button>
      </form>
      <div id="ledger-status"></div>
    </div>
  </section>

</main>

<footer>RESCOPE 2K26 · Horizon · Eclipse · Vector · Chroma</footer>

<script type="module">
  import {
    ADMIN_PASSWORD,
    addProgram,
    deleteProgram,
    awardPoints,
    listenPrograms,
  } from "./firebase-config.js";

  const gate = document.getElementById("gate");
  const dashboard = document.getElementById("dashboard");
  const gateError = document.getElementById("gate-error");

  document.getElementById("admin-login-btn").addEventListener("click", () => {
    const pw = document.getElementById("admin-password").value;
    if (pw === ADMIN_PASSWORD) {
      gate.classList.add("hidden");
      dashboard.classList.remove("hidden");
      gateError.textContent = "";
      startProgramListener();
    } else {
      gateError.textContent = "Incorrect master password.";
    }
  });

  document.getElementById("signout-btn").addEventListener("click", () => {
    document.getElementById("admin-password").value = "";
    dashboard.classList.add("hidden");
    gate.classList.remove("hidden");
  });

  let programsData = [];
  let programListenerStarted = false;

  function startProgramListener() {
    if (programListenerStarted) return;
    programListenerStarted = true;
    listenPrograms((programs) => {
      programsData = programs.sort((a, b) => a.id.localeCompare(b.id));
      renderProgramList();
      renderLedgerProgramOptions();
    });
  }

  function getProgramCategory(p) {
    const cat = (p.category || p.type || '').toLowerCase();
    if (cat.includes('art')) return 'art';
    if (cat.includes('sport')) return 'sport';
    return p.id.toLowerCase().startsWith('s') ? 'sport' : 'art';
  }

  function renderProgramList() {
    const el = document.getElementById("program-list");
    if (programsData.length === 0) {
      el.innerHTML = `<div class="empty-state">No programs yet. Add one to get started.</div>`;
      return;
    }

    const arts = programsData.filter(p => getProgramCategory(p) === 'art');
    const sports = programsData.filter(p => getProgramCategory(p) === 'sport');

    const formatRow = (p, label) => `
      <div class="roster-row" style="margin-bottom: 6px;">
        <div class="who">
          <span>${p.title} <small style="font-size:0.7rem; color:#6b6b6b; font-weight:normal;">(${label})</small></span>
          <span class="code">${p.id}</span>
        </div>
        <button class="btn btn-danger" data-delete="${p.id}" style="padding:8px 12px;font-size:0.72rem;">Delete</button>
      </div>
    `;

    el.innerHTML = `
      <div style="font-family:var(--font-mono); font-weight:800; font-size:0.85rem; margin-bottom:10px; border-bottom:1px solid #111; padding-bottom:4px;">🎨 Arts Category</div>
      ${arts.length ? arts.map(p => formatRow(p, 'Art')).join("") : '<div class="empty-state" style="padding:10px; margin-bottom:15px;">No Arts Programs</div>'}
      
      <div style="font-family:var(--font-mono); font-weight:800; font-size:0.85rem; margin-top:20px; margin-bottom:10px; border-bottom:1px solid #111; padding-bottom:4px;">⚽ Sports Category</div>
      ${sports.length ? sports.map(p => formatRow(p, 'Sport')).join("") : '<div class="empty-state" style="padding:10px;">No Sports Programs</div>'}
    `;

    el.querySelectorAll("[data-delete]").forEach((btn) => {
      btn.addEventListener("click", async () => {
        if (!confirm(`Delete program "${btn.dataset.delete}"? This cannot be undone.`)) return;
        try {
          await deleteProgram(btn.dataset.delete);
        } catch (err) {
          alert(err.message);
        }
      });
    });
  }

  function renderLedgerProgramOptions() {
    const select = document.getElementById("ledger-program");
    const current = select.value;

    const arts = programsData.filter(p => getProgramCategory(p) === 'art');
    const sports = programsData.filter(p => getProgramCategory(p) === 'sport');

    const artOptions = arts.map((p) => `<option value="${p.id}">${p.id} — ${p.title}</option>`).join("");
    const sportOptions = sports.map((p) => `<option value="${p.id}">${p.id} — ${p.title}</option>`).join("");

    select.innerHTML = `
      <option value="">— Select program —</option>
      ${arts.length ? `<optgroup label="🎨 Arts Programs">${artOptions}</optgroup>` : ''}
      ${sports.length ? `<optgroup label="⚽ Sports Programs">${sportOptions}</optgroup>` : ''}
    `;
    if (current) select.value = current;
  }

  document.getElementById("add-program-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const codeInput = document.getElementById("program-code");
    const titleInput = document.getElementById("program-title");
    const categoryInput = document.getElementById("program-category");
    const statusEl = document.getElementById("add-program-status");
    statusEl.innerHTML = "";
    try {
      // Passes the category value along to the data adapter
      const code = await addProgram(codeInput.value, titleInput.value, categoryInput.value);
      statusEl.innerHTML = `<div class="status-msg ok">Program "${code}" added successfully.</div>`;
      codeInput.value = "";
      titleInput.value = "";
    } catch (err) {
      statusEl.innerHTML = `<div class="status-msg err">${err.message}</div>`;
    }
  });

  // ---- Ledger action toggle ----
  let currentAction = "add";
  document.querySelectorAll("#action-toggle button").forEach((btn) => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("#action-toggle button").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      currentAction = btn.dataset.action;
    });
  });

  document.getElementById("ledger-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const programCode = document.getElementById("ledger-program").value;
    const candidateCode = document.getElementById("ledger-code").value;
    const rawValue = Number(document.getElementById("ledger-value").value);
    const statusEl = document.getElementById("ledger-status");
    statusEl.innerHTML = "";

    if (!programCode) {
      statusEl.innerHTML = `<div class="status-msg err">Select a program first.</div>`;
      return;
    }
    if (!candidateCode.trim()) {
      statusEl.innerHTML = `<div class="status-msg err">Enter a candidate code.</div>`;
      return;
    }
    if (!rawValue || rawValue <= 0) {
      statusEl.innerHTML = `<div class="status-msg err">Enter a positive point value.</div>`;
      return;
    }

    const delta = currentAction === "add" ? rawValue : -rawValue;

    try {
      const result = await awardPoints(programCode, candidateCode, delta);
      statusEl.innerHTML = `<div class="status-msg ok">
        ${currentAction === "add" ? "Added" : "Subtracted"} ${rawValue} pt(s) for ${candidateCode.toUpperCase()} in ${programCode.toUpperCase()}.
        New program score: ${result.newProgramScore} · New candidate total: ${result.newParticipantTotal}.
      </div>`;
      document.getElementById("ledger-code").value = "";
      document.getElementById("ledger-value").value = "";
    } catch (err) {
      statusEl.innerHTML = `<div class="status-msg err">${err.message}</div>`;
    }
  });
</script>

</body>
</html>

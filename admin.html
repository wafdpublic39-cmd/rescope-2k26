<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RESCOPE 2K26 — Admin Control</title>
<link rel="stylesheet" href="style.css" />
<style>
  .admin-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
    margin-top: 20px;
  }
  @media (max-width: 900px) {
    .admin-grid { grid-template-columns: 1fr; }
  }
  .score-input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    background: var(--paper-off);
    padding: 10px;
    border: 1px solid var(--ink);
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">RESCOPE <span class="brand-year">2K26</span></div>
    <nav class="nav-links">
      <a href="index.html">Standings</a>
      <a href="signin.html">Team Access</a>
      <a href="admin.html" class="active">Admin</a>
    </nav>
  </div>
</header>

<main class="container">
  <section class="section">
    <div class="section-head">
      <h2>Admin Control Panel</h2>
      <span class="ticker" id="db-status">● Offline</span>
    </div>

    <div class="admin-grid">
      <!-- COLUMN 1: Program Creator -->
      <div class="panel">
        <h3 style="margin-bottom: 15px;">Create New Program</h3>
        <form id="program-form">
          <div class="field">
            <label for="prog-id">Program Code</label>
            <input type="text" id="prog-id" placeholder="e.g. A01 or S01" required />
          </div>
          <div class="field">
            <label for="prog-title">Program Title</label>
            <input type="text" id="prog-title" placeholder="e.g. Oppana or Football" required />
          </div>
          <div class="field">
            <label for="prog-category">Program Category</label>
            <select id="prog-category" required>
              <option value="art">🎨 Arts Program</option>
              <option value="sport">⚽ Sports Program</option>
            </select>
          </div>
          <button type="submit" class="btn btn-block">Add Program</button>
        </form>
        <div id="program-status" style="margin-top:10px;"></div>
      </div>

      <!-- COLUMN 2: Assign Scores / Results -->
      <div class="panel">
        <h3 style="margin-bottom: 15px;">Publish Event Scores</h3>
        <form id="scoring-form">
          <div class="field">
            <label for="score-program-select">Select Program</label>
            <select id="score-program-select" required>
              <option value="">— Select program —</option>
            </select>
          </div>
          
          <div id="score-inputs-container">
            <p style="font-size:0.85rem; color:#6b6b6b;">Select a program to allocate point scores to candidates.</p>
          </div>
          
          <button type="button" id="add-score-row" class="btn btn-outline" style="margin-bottom:15px; display:none;">+ Add Row</button>
          <button type="submit" id="save-scores-btn" class="btn btn-block btn-signal" style="display:none;">Publish Scores</button>
        </form>
        <div id="scoring-status" style="margin-top:10px;"></div>
      </div>
    </div>
  </section>
</main>

<footer>RESCOPE 2K26 · Admin Interface</footer>

<script type="module">
  import { supabase, listenPrograms, listenParticipants } from "./firebase-config.js";

  const dbStatus = document.getElementById("db-status");
  const programForm = document.getElementById("program-form");
  const programStatus = document.getElementById("program-status");
  
  const scoreProgramSelect = document.getElementById("score-program-select");
  const scoreInputsContainer = document.getElementById("score-inputs-container");
  const addScoreRowBtn = document.getElementById("add-score-row");
  const saveScoresBtn = document.getElementById("save-scores-btn");
  const scoringForm = document.getElementById("scoring-form");
  const scoringStatus = document.getElementById("scoring-status");

  let allPrograms = [];
  let allParticipants = [];

  // Monitor Network
  dbStatus.textContent = "● Connected to Supabase";
  dbStatus.style.color = "#0B8457";

  // Listen to active datasets
  listenParticipants(parts => {
    allParticipants = parts;
  });

  listenPrograms(progs => {
    allPrograms = progs;
    populateProgramDropdowns();
  });

  function populateProgramDropdowns() {
    const currentSelection = scoreProgramSelect.value;
    
    // Group programs dynamically
    const artPrograms = allPrograms.filter(p => (p.category || 'art') === 'art');
    const sportPrograms = allPrograms.filter(p => p.category === 'sport');

    const artOptions = artPrograms.map(p => `<option value="${p.id}">${p.id} — ${p.title}</option>`).join("");
    const sportOptions = sportPrograms.map(p => `<option value="${p.id}">${p.id} — ${p.title}</option>`).join("");

    scoreProgramSelect.innerHTML = `
      <option value="">— Select program —</option>
      ${artPrograms.length > 0 ? `<optgroup label="🎨 Arts Programs">${artOptions}</optgroup>` : ''}
      ${sportPrograms.length > 0 ? `<optgroup label="⚽ Sports Programs">${sportOptions}</optgroup>` : ''}
    `;

    if (currentSelection) scoreProgramSelect.value = currentSelection;
  }

  // Handle Program Creation
  programForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    programStatus.innerHTML = "";
    
    const id = document.getElementById("prog-id").value.trim().toUpperCase();
    const title = document.getElementById("prog-title").value.trim();
    const category = document.getElementById("prog-category").value;

    try {
      const { error } = await supabase.from("programs").insert([{
        id,
        title,
        category,
        scores: {}
      }]);

      if (error) throw error;

      programStatus.innerHTML = `<div class="status-msg ok">Program "${title}" created successfully!</div>`;
      programForm.reset();
    } catch (err) {
      programStatus.innerHTML = `<div class="status-msg err">Error: ${err.message}</div>`;
    }
  });

  // Handle Score Inputs rendering
  scoreProgramSelect.addEventListener("change", () => {
    const progId = scoreProgramSelect.value;
    scoreInputsContainer.innerHTML = "";
    
    if (!progId) {
      addScoreRowBtn.style.display = "none";
      saveScoresBtn.style.display = "none";
      return;
    }

    addScoreRowBtn.style.display = "inline-block";
    saveScoresBtn.style.display = "block";

    const program = allPrograms.find(p => p.id === progId);
    const existingScores = program ? program.scores || {} : {};

    if (Object.keys(existingScores).length === 0) {
      addScoreInputRow("", "");
    } else {
      Object.entries(existingScores).forEach(([candidateCode, points]) => {
        addScoreInputRow(candidateCode, points);
      });
    }
  });

  function addScoreInputRow(candidateCode = "", points = "") {
    const row = document.createElement("div");
    row.className = "score-input-row";
    
    row.innerHTML = `
      <input type="text" placeholder="Cand. Code (e.g. HZ07)" value="${candidateCode}" class="cand-code-input" required style="flex:2;" />
      <input type="number" placeholder="Points" value="${points}" class="cand-points-input" required style="flex:1;" />
      <button type="button" class="btn btn-danger remove-row-btn" style="padding: 6px 12px;">X</button>
    `;

    row.querySelector(".remove-row-btn").addEventListener("click", () => row.remove());
    scoreInputsContainer.appendChild(row);
  }

  addScoreRowBtn.addEventListener("click", () => addScoreInputRow("", ""));

  // Submit and update scores
  scoringForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    scoringStatus.innerHTML = "";
    
    const progId = scoreProgramSelect.value;
    const rows = scoreInputsContainer.querySelectorAll(".score-input-row");
    
    const scores = {};
    rows.forEach(row => {
      const code = row.querySelector(".cand-code-input").value.trim().toUpperCase();
      const points = parseInt(row.querySelector(".cand-points-input").value) || 0;
      if (code) scores[code] = points;
    });

    try {
      // 1. Update program scores
      const { error: progErr } = await supabase.from("programs").update({ scores }).eq("id", progId);
      if (progErr) throw progErr;

      // 2. Recalculate candidate total scores
      await recalculatePoints();

      scoringStatus.innerHTML = `<div class="status-msg ok">Scores successfully published!</div>`;
    } catch (err) {
      scoringStatus.innerHTML = `<div class="status-msg err">Error: ${err.message}</div>`;
    }
  });

  // Self-healing score compiler
  async function recalculatePoints() {
    const participantTotals = {};
    const houseTotals = { Horizon: 0, Eclipse: 0, Vector: 0, Chroma: 0 };

    const { data: progs } = await supabase.from("programs").select("*");
    const { data: parts } = await supabase.from("participants").select("*");

    parts.forEach(p => { participantTotals[p.id] = 0; });

    progs.forEach(p => {
      Object.entries(p.scores || {}).forEach(([code, pts]) => {
        if (participantTotals[code] !== undefined) {
          participantTotals[code] += Number(pts);
        }
        const candidateObj = parts.find(part => part.id === code);
        if (candidateObj && houseTotals[candidateObj.team] !== undefined) {
          houseTotals[candidateObj.team] += Number(pts);
        }
      });
    });

    // Bulk update participants
    for (const [id, totalPoints] of Object.entries(participantTotals)) {
      await supabase.from("participants").update({ totalPoints }).eq("id", id);
    }

    // Bulk update house scores
    for (const [id, totalPoints] of Object.entries(houseTotals)) {
      await supabase.from("teams").update({ totalPoints }).eq("id", id);
    }
  }
</script>

</body>
</html>
